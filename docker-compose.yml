services:
  postgres:
    image: postgres:16-alpine
    container_name: family-finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: family_finance
      POSTGRES_PASSWORD: family_finance
      POSTGRES_DB: family_finance
    ports:
      - "5433:5432"
    volumes:
      - family-finance-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_finance -d family_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: family-finance-api
    restart: unless-stopped
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://family_finance:family_finance@postgres:5432/family_finance?schema=public
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: family-finance-web
    restart: unless-stopped
    ports:
      - "5173:4173"
    depends_on:
      - api

volumes:
  family-finance-postgres:

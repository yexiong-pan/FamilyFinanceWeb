services:
  postgres:
    image: postgres:16-alpine
    container_name: family-finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: family_finance
      POSTGRES_PASSWORD: family_finance
      POSTGRES_DB: family_finance
    ports:
      - "5433:5432"
    volumes:
      - family-finance-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_finance -d family_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  family-finance-postgres:
